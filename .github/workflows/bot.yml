name: Steam Code Bot 24/7

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: steam-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        echo "📦 Установка зависимостей..."
        pip install -r requirements.txt
        echo "✅ Зависимости установлены"
    
    - name: Verify secrets
      run: |
        echo "🔍 Проверка переменных окружения..."
        if [ -z "$BOT_TOKEN" ]; then echo "❌ BOT_TOKEN не задан!"; exit 1; fi
        if [ -z "$EMAIL_ADDRESS" ]; then echo "❌ EMAIL_ADDRESS не задан!"; exit 1; fi
        if [ -z "$EMAIL_PASSWORD" ]; then echo "❌ EMAIL_PASSWORD не задан!"; exit 1; fi
        echo "✅ Все переменные заданы"
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
      run: |
        echo "🤖 Бот запускается..."
        python -u bot.py 2>&1 | tee bot.log &
        BOT_PID=$!
        echo "📋 PID бота: $BOT_PID"
        
        # Ждём 30 секунд и проверяем что бот запустился
        sleep 30
        if ps -p $BOT_PID > /dev/null; then
          echo "✅ Бот успешно запущен и работает!"
          wait $BOT_PID
        else
          echo "❌ Бот упал при запуске!"
          cat bot.log
          exit 1
        fi
